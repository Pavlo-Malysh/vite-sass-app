      </li>

          <svg width="16" height="16" class="close-btn">
            <use href="/sprite.svg#icon-cancel-circle"></use>

      </li>
      <li class=" alert-item-warning">
        <svg width="16" height="16" class="item-icon">

            <use href="/sprite.svg#icon-cancel-circle"></use>
          </svg>
          </svg>
        </button>
      </li>
      <li class=" alert-item-info ">
        <svg width="16" height="16" class="item-icon">
          <use href="/sprite.svg#icon-pushpin"></use>
        </svg>
        <p class="item-text">Info</p>

          <svg width="16" height="16" class="close-btn">
            <use href="/sprite.svg#icon-cancel-circle"></use>
          </svg>
          </svg>
        </button>
      </li>
